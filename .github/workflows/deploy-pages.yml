name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para que el job pueda publicar Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo una corrida concurrente; la última cancela las pendientes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build
        env:
          GREENLOG_GITHUB_PAGES: 'true'

      - name: SPA fallback (404.html = index.html)
        run: |
          cp dist/index.html dist/404.html
          for route in login planeacion ejecucion reportes; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
